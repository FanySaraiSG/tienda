<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Look Lab | Winter Atelier</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <nav>
        <div class="nav-left">
            <button onclick="toggleHistorial()" class="btn-pedidos-minimal">Mis Pedidos</button>
        </div>
        <div class="logo-center">THE LOOK LAB</div>
        <div class="nav-right">
            <div class="cart-icon" onclick="toggleCarrito()">🛒 <span id="cartCount">0</span></div>
        </div>
    </nav>

    <header class="winter-header">
        <h1>COLECCIÓN INVIERNO</h1>
        <p>ATELIER 2026 — EDICIÓN LIMITADA</p>
    </header>

    <main id="gridProductos" class="grid-container"></main>

    <aside id="sideCart" class="cart-sidebar"></aside>

    <div id="modalPago" class="modal">
        <div class="modal-content">
            <div id="paso1"></div>
            <div id="paso2" style="display:none;">
                <h3 style="letter-spacing:2px;">VERIFICACIÓN</h3>
                <p style="font-size:12px; color:#7f8c8d;">Ingrese el código enviado a su correo</p>
                <input type="number" id="inputCodigo" placeholder="0000" class="vivid-input" style="text-align:center; font-size:20px;">
                <button onclick="finalizarCompra()" class="btn-solicitar">CONFIRMAR PEDIDO</button>
            </div>
            <button class="close-modal" onclick="document.getElementById('modalPago').style.display='none'">&times;</button>
        </div>
    </div>

    <div id="seccionHistorial" class="historial-overlay" style="display:none;">
        <span onclick="toggleHistorial()" class="close-historial">&times;</span>
        <div class="historial-content">
            <h2 style="font-family:serif; letter-spacing:5px; text-align:center;">MIS COMPRAS</h2>
            <div id="contenedorPedidos"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
